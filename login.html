<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Instagram · Log in</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Animated background blobs -->
    <div class="bg-orb orb1"></div>
    <div class="bg-orb orb2"></div>
    <div class="bg-orb orb3"></div>

    <div class="page-wrapper">
      <!-- Left panel: phone mockup (hidden on small screens) -->
      <div class="left-panel" aria-hidden="true">
        <div class="phone-mockup">
          <div class="phone-screen">
            <div class="phone-stories">
              <div class="story-ring s1"><div class="story-avatar"></div></div>
              <div class="story-ring s2"><div class="story-avatar"></div></div>
              <div class="story-ring s3"><div class="story-avatar"></div></div>
              <div class="story-ring s4"><div class="story-avatar"></div></div>
            </div>
            <div class="phone-post">
              <div class="post-header">
                <div class="post-avatar"></div>
                <div class="post-meta">
                  <div class="post-name"></div>
                  <div class="post-loc"></div>
                </div>
              </div>
              <div class="post-img"></div>
              <div class="post-actions">
                <span class="icon-heart">♥</span>
                <span class="icon-comment">💬</span>
                <span class="icon-share">✈︎</span>
              </div>
              <div class="post-likes"></div>
              <div class="post-caption-line"></div>
              <div class="post-caption-line short"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Right panel: form -->
      <div class="right-panel">
        <div class="card" id="login-card">
          <div class="logo-wrap">
            <svg
              class="logo-svg"
              viewBox="0 0 132 132"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
              aria-label="Instagram"
            >
              <defs>
                <linearGradient
                  id="ig-grad"
                  x1="0%"
                  y1="100%"
                  x2="100%"
                  y2="0%"
                >
                  <stop offset="0%" stop-color="#f9ce34" />
                  <stop offset="30%" stop-color="#ee2a7b" />
                  <stop offset="70%" stop-color="#6228d7" />
                  <stop offset="100%" stop-color="#4f5bd5" />
                </linearGradient>
              </defs>
              <rect
                x="6"
                y="6"
                width="120"
                height="120"
                rx="30"
                fill="url(#ig-grad)"
              />
              <circle
                cx="66"
                cy="66"
                r="28"
                stroke="white"
                stroke-width="8"
                fill="none"
              />
              <circle cx="97" cy="36" r="7" fill="white" />
            </svg>
            <span class="logo-text">Instagram</span>
          </div>

          <p class="card-tagline">
            Sign in to see photos &amp; videos from your friends.
          </p>

          <div class="divider-row">
            <span class="divider-line"></span>
            <span class="divider-text">OR</span>
            <span class="divider-line"></span>
          </div>

          <form class="auth-form" novalidate>
            <div class="field-group">
              <input
                class="field-input"
                type="text"
                id="login-email"
                autocomplete="email"
                required
                placeholder=" "
              />
              <label class="field-label" for="login-email"
                >Phone number, username or email</label
              >
            </div>
            <div class="field-group">
              <input
                class="field-input"
                type="password"
                id="login-pass"
                autocomplete="current-password"
                required
                placeholder=" "
              />
              <label class="field-label" for="login-pass">Password</label>
              <button
                type="button"
                class="toggle-pass"
                aria-label="Show password"
              >
                Show
              </button>
            </div>
            <button type="submit" class="btn-primary ripple">Log in</button>
          </form>

          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <div class="card card-slim">
          <p>
            Don't have an account?
            <a href="signup.html" class="link-accent">Sign up</a>
          </p>
        </div>

        <div class="app-badges">
          <p class="get-app-text">Get the app.</p>
          <div class="badge-row">
            <a href="#" class="badge-btn">
              <svg viewBox="0 0 24 24" fill="currentColor" class="badge-icon">
                <path
                  d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.7 9.05 7.4c1.39.07 2.35.76 3.16.78.81-.04 1.65-.71 3.14-.78 1.33.06 2.6.73 3.33 1.89-3.04 1.81-2.53 5.8.42 7zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"
                />
              </svg>
              App Store
            </a>
            <a href="#" class="badge-btn">
              <svg viewBox="0 0 24 24" fill="currentColor" class="badge-icon">
                <path
                  d="M3.18 23.76a2.5 2.5 0 0 1-.68-1.82V2.06a2.5 2.5 0 0 1 .68-1.82l.1-.08L14.1 11.08v.28L3.28 23.84l-.1-.08zM17.84 15.3l-3.74-3.74v-.4l3.74-3.73.08.05 4.43 2.52c1.26.72 1.26 1.9 0 2.62l-4.43 2.52-.08.06zM3.18.24l13.84 7.88-3.76 3.76L3.18.24zm0 23.52 10.08-11.64 3.76 3.76L3.18 23.76z"
                />
              </svg>
              Google Play
            </a>
          </div>
        </div>
      </div>
    </div>

    <footer class="site-footer">
      <nav class="footer-links">
        <a href="#">Meta</a><a href="#">About</a><a href="#">Blog</a
        ><a href="#">Jobs</a> <a href="#">Help</a><a href="#">API</a
        ><a href="#">Privacy</a><a href="#">Terms</a> <a href="#">Locations</a
        ><a href="#">Language</a>
      </nav>
      <p class="footer-copy">© 2026 Instagram (Built by Bright Ayomide)</p>
    </footer>

    <script src="scripts.js"></script>
  </body>
</html>
